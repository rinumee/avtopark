<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi foydalanuvchi - Avtopark</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; }
        .sidebar { width: 260px; background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%); color: white; position: fixed; height: 100%; padding: 20px; }
        .logo { font-size: 24px; font-weight: bold; text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .nav-item { padding: 12px 20px; margin: 5px 0; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); }
        .nav-item a { color: white; text-decoration: none; display: block; }
        .main-content { margin-left: 260px; padding: 20px; }
        .top-bar { background: white; padding: 15px 30px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #e74c3c; color: white; padding: 8px 20px; border-radius: 8px; text-decoration: none; }
        .section { background: white; border-radius: 15px; padding: 25px; max-width: 600px; margin: 0 auto; }
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #2c3e50; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: #3498db; color: white; }
        .btn-secondary { background: #95a5a6; color: white; text-decoration: none; display: inline-block; }
        .alert { padding: 12px; border-radius: 8px; margin-bottom: 20px; background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🚗 AVTOPARK</div>
        <div class="nav-item"><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></div>
        <div class="nav-item"><a href="{% url 'car_list' %}">🚗 Avtomobillar</a></div>
        <div class="nav-item"><a href="{% url 'booking_list' %}">📅 Bronlar</a></div>
        <div class="nav-item active"><a href="{% url 'admin_user_list' %}">👥 Foydalanuvchilar</a></div>
        <div class="nav-item"><a href="{% url 'admin_settings' %}">⚙️ Sozlamalar</a></div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2>Yangi foydalanuvchi</h2>
            <div><span>👑 {{ user.full_name }}</span><a href="{% url 'logout' %}" class="logout-btn" style="margin-left: 20px;">Chiqish</a></div>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="alert" style="max-width: 600px; margin: 0 auto 20px auto;">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="section">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>To'liq ism</label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control">
                </div>
                <div class="form-group">
                    <label>Parol</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Foydalanuvchi turi</label>
                    <select name="user_type" class="form-control">
                        <option value="user">Oddiy foydalanuvchi</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">✅ Yaratish</button>
                <a href="{% url 'admin_user_list' %}" class="btn btn-secondary">❌ Bekor qilish</a>
            </form>
        </div>
    </div>
</body>
</html>
